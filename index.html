<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="ワインの記憶" />
<meta name="theme-color" content="#f6f1ea" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" href="icon-192.png" />
<link rel="manifest" href="manifest.webmanifest" />
<title>ワインの記憶</title>
<style>
  :root {
    --bg: #f6f1ea;
    --card: #fffdf9;
    --ink: #2b2622;
    --ink-soft: #7c736a;
    --ink-faint: #aaa093;
    --line: #e7ded2;
    --wine: #7a2230;
    --wine-soft: #f0e2df;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    line-height: 1.7;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 0 18px 120px; }

  header {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 28px 4px 18px;
  }
  header h1 { font-size: 19px; font-weight: 600; margin: 0; letter-spacing: .02em; }
  header .count { font-size: 12px; color: var(--ink-faint); }

  /* read-back list */
  .entry {
    display: flex; gap: 14px; padding: 18px 0;
    border-top: 1px solid var(--line);
  }
  .entry:first-of-type { border-top: none; }
  .entry .thumb {
    width: 72px; height: 72px; border-radius: 12px; flex-shrink: 0;
    object-fit: cover; background: var(--wine-soft);
    display: flex; align-items: center; justify-content: center;
    color: var(--wine); font-size: 22px;
  }
  .entry .body { flex: 1; min-width: 0; }
  .entry .date { font-size: 12px; color: var(--ink-faint); margin-bottom: 4px; }
  .entry .note {
    font-family: Georgia, "Hiragino Mincho ProN", "Yu Mincho", serif;
    font-size: 15.5px; color: var(--ink); margin: 0; white-space: pre-wrap;
    word-break: break-word;
  }
  .entry .note.empty { color: var(--ink-faint); font-style: italic; }

  .empty-state {
    text-align: center; color: var(--ink-faint); padding: 70px 20px;
    font-size: 15px;
  }
  .empty-state .big { font-size: 40px; margin-bottom: 12px; }

  /* floating add button */
  .fab {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: calc(22px + env(safe-area-inset-bottom));
    background: var(--wine); color: #fff; border: none;
    height: 54px; padding: 0 26px; border-radius: 27px;
    font-size: 16px; font-weight: 600; letter-spacing: .03em;
    box-shadow: 0 6px 20px rgba(122,34,48,.35);
    display: flex; align-items: center; gap: 8px; cursor: pointer;
  }
  .fab:active { transform: translateX(-50%) scale(.97); }

  /* editor sheet */
  .sheet-bg {
    position: fixed; inset: 0; background: rgba(40,30,28,.45);
    display: none; align-items: flex-end; justify-content: center; z-index: 20;
  }
  .sheet-bg.open { display: flex; }
  .sheet {
    background: var(--card); width: 100%; max-width: 560px;
    border-radius: 20px 20px 0 0; padding: 10px 20px;
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
    max-height: 92vh; overflow-y: auto;
  }
  .grip { width: 38px; height: 4px; background: var(--line); border-radius: 2px; margin: 8px auto 14px; }

  .photo-pick {
    width: 100%; aspect-ratio: 4/3; border-radius: 14px;
    background: var(--wine-soft); border: 1.5px dashed #d8c4c0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--wine); cursor: pointer; overflow: hidden; margin-bottom: 16px;
  }
  .photo-pick img { width: 100%; height: 100%; object-fit: cover; }
  .photo-pick .ico { font-size: 34px; }
  .photo-pick .lbl { font-size: 13px; margin-top: 6px; color: var(--ink-faint); }

  .photo-actions { display: flex; gap: 10px; margin-bottom: 16px; }
  .pick-btn {
    flex: 1; height: 48px; border-radius: 12px; cursor: pointer;
    border: 1px solid var(--line); background: #fff; color: var(--wine);
    font-size: 15px; font-weight: 600; font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .pick-btn:active { background: var(--wine-soft); }
  .pick-btn .pi { font-size: 18px; }

  textarea {
    width: 100%; min-height: 110px; border: 1px solid var(--line);
    border-radius: 12px; padding: 14px; font-size: 16px; line-height: 1.7;
    font-family: inherit; resize: none; background: #fff; color: var(--ink);
  }
  textarea:focus { outline: none; border-color: var(--wine); }

  .date-row {
    display: flex; align-items: center; gap: 8px;
    margin: 14px 2px 4px; font-size: 13px; color: var(--ink-soft);
  }
  .date-row input {
    border: 1px solid var(--line); border-radius: 8px; padding: 6px 8px;
    font-size: 13px; font-family: inherit; color: var(--ink); background: #fff;
  }

  .sheet-actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn {
    flex: 1; height: 50px; border-radius: 12px; border: none;
    font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .btn.save { background: var(--wine); color: #fff; }
  .btn.save:active { opacity: .85; }
  .btn.ghost { background: transparent; color: var(--ink-soft); border: 1px solid var(--line); }
  .btn.del { background: transparent; color: var(--wine); border: 1px solid var(--wine-soft); flex: 0 0 50px; font-size: 20px; }

  .gear {
    background: none; border: none; color: var(--ink-faint);
    font-size: 22px; cursor: pointer; padding: 4px; line-height: 1;
  }
  .gear:active { color: var(--wine); }

  .settings-panel {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 12px; padding: 12px 14px; margin: 0 0 14px;
  }
  .settings-title { margin: 0 0 8px; font-size: 12px; color: var(--ink-faint); }
  .menu-btn {
    display: block; width: 100%; text-align: left;
    background: none; border: none; color: var(--wine);
    font-size: 15px; cursor: pointer; padding: 10px 4px; font-family: inherit;
    border-top: 1px solid var(--line);
  }
  .settings-title + .menu-btn { border-top: none; }

  .searchbar { display: flex; align-items: center; gap: 10px; margin: 0 2px 6px; }
  #searchInput {
    flex: 1; height: 40px; border: 1px solid var(--line); border-radius: 20px;
    padding: 0 16px; font-size: 15px; font-family: inherit; background: #fff; color: var(--ink);
  }
  #searchInput:focus { outline: none; border-color: var(--wine); }
  .searchbar .count { font-size: 12px; color: var(--ink-faint); white-space: nowrap; }

  .name-input {
    width: 100%; border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 14px; font-size: 16px; font-family: inherit;
    background: #fff; color: var(--ink); margin-bottom: 10px;
  }
  .name-input:focus { outline: none; border-color: var(--wine); }
  .field-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .change-photo {
    background: none; border: none; color: var(--wine);
    font-size: 13px; cursor: pointer; font-family: inherit;
    padding: 2px 4px; margin: 0 0 14px;
  }

  .entry .wname {
    font-size: 15px; font-weight: 600; color: var(--ink); margin: 0 0 2px;
    word-break: break-word;
  }
  .entry .wsub { font-size: 12px; color: var(--ink-soft); margin: 0 0 2px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>ワインの記憶</h1>
    <button class="gear" id="settingsBtn" aria-label="設定">⚙</button>
  </header>

  <div class="settings-panel" id="settingsPanel" style="display:none">
    <p class="settings-title">バックアップ（記憶の控え）</p>
    <button class="menu-btn" id="exportBtn">📤 書き出す（全部の控えを保存）</button>
    <button class="menu-btn" id="importBtn">📥 読み込む（控えから戻す）</button>
    <input type="file" id="importInput" accept="application/json" hidden />
  </div>

  <div class="searchbar" id="searchbar">
    <input type="search" id="searchInput" placeholder="🔍 名前・品種・年・ひとことで探す" />
    <span class="count" id="count"></span>
  </div>

  <div id="list"></div>
</div>

<button class="fab" id="addBtn">＋ いま飲んでる一本</button>

<!-- editor -->
<div class="sheet-bg" id="sheetBg">
  <div class="sheet">
    <div class="grip"></div>
    <div class="photo-pick" id="photoPick">
      <span class="ico" id="photoIco">🍷</span>
      <span class="lbl" id="photoLbl">写真がまだありません</span>
      <img id="photoPreview" style="display:none" alt="" />
    </div>
    <div class="photo-actions" id="photoActions">
      <button type="button" class="pick-btn" id="cameraBtn"><span class="pi">📷</span> いま撮る</button>
      <button type="button" class="pick-btn" id="libraryBtn"><span class="pi">🖼</span> 写真から選ぶ</button>
    </div>
    <button type="button" class="change-photo" id="changePhotoBtn" style="display:none">写真を変える</button>
    <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden />
    <input type="file" id="photoInput" accept="image/*" hidden />
    <input type="text" id="nameInput" class="name-input" placeholder="ワイン名（例：シャトー・ラトゥール）" />
    <div class="field-row">
      <input type="text" id="grapeInput" class="name-input" style="flex:2; margin-bottom:0" placeholder="品種（例：ピノ・ノワール）" />
      <input type="text" id="vintageInput" class="name-input" style="flex:1; margin-bottom:0" placeholder="年（2015）" inputmode="numeric" />
    </div>
    <textarea id="noteInput" placeholder="今飲んで思ったこと… 香り、味、余韻。何と合わせた？ 合った？"></textarea>
    <div class="date-row">
      <span>いつ</span>
      <input type="date" id="dateInput" />
    </div>
    <div class="sheet-actions">
      <button class="btn ghost" id="cancelBtn">やめる</button>
      <button class="btn del" id="delBtn" style="display:none">🗑</button>
      <button class="btn save" id="saveBtn">残す</button>
    </div>
  </div>
</div>

<script>
// ---- データ保存（この端末の中だけ。IndexedDB を使用）----
const DB_NAME = 'wine-memory', STORE = 'entries';
let db;
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, 1);
    r.onupgradeneeded = e => {
      e.target.result.createObjectStore(STORE, { keyPath: 'id' });
    };
    r.onsuccess = e => { db = e.target.result; res(); };
    r.onerror = e => rej(e);
  });
}
function tx(mode) { return db.transaction(STORE, mode).objectStore(STORE); }
function allEntries() {
  return new Promise(res => {
    const out = []; const c = tx('readonly').openCursor();
    c.onsuccess = e => {
      const cur = e.target.result;
      if (cur) { out.push(cur.value); cur.continue(); }
      else res(out);
    };
  });
}
function putEntry(en) { return new Promise(r => { tx('readwrite').put(en).onsuccess = r; }); }
function delEntry(id) { return new Promise(r => { tx('readwrite').delete(id).onsuccess = r; }); }

// ---- 画面 ----
const $ = s => document.querySelector(s);
let editingId = null, pickedPhoto = null;

function todayLocal() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDate(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

let searchQuery = '';

async function render() {
  const all = (await allEntries()).sort((a,b) => b.date.localeCompare(a.date) || b.id - a.id);
  $('#count').textContent = all.length ? `${all.length}本` : '';
  const list = $('#list');

  if (!all.length) {
    list.innerHTML = `<div class="empty-state"><div class="big">🍷</div>飲んだ一本を、ここに。<br>写真とひとことだけ。</div>`;
    return;
  }

  const q = searchQuery.trim().toLowerCase();
  const entries = q
    ? all.filter(en => ((en.name||'')+' '+(en.grape||'')+' '+(en.vintage||'')+' '+(en.note||'')).toLowerCase().includes(q))
    : all;

  if (!entries.length) {
    list.innerHTML = `<div class="empty-state">「${escapeHtml(searchQuery)}」は見つかりませんでした。</div>`;
    return;
  }

  list.innerHTML = entries.map(en => {
    const sub = [en.grape, en.vintage].filter(Boolean).join(' · ');
    return `
    <div class="entry" data-id="${en.id}">
      ${en.photo ? `<img class="thumb" src="${en.photo}" alt="" />` : `<div class="thumb">🍷</div>`}
      <div class="body">
        ${en.name ? `<p class="wname">${escapeHtml(en.name)}</p>` : ''}
        ${sub ? `<p class="wsub">${escapeHtml(sub)}</p>` : ''}
        <div class="date">${fmtDate(en.date)}</div>
        <p class="note ${en.note ? '' : 'empty'}">${en.note ? escapeHtml(en.note) : 'ひとこと無し'}</p>
      </div>
    </div>`;
  }).join('');
  list.querySelectorAll('.entry').forEach(el =>
    el.onclick = () => openEditor(all.find(x => x.id == el.dataset.id)));
}
function escapeHtml(s){ return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

// ---- エディタ ----
function openEditor(en) {
  editingId = en ? en.id : null;
  pickedPhoto = en ? en.photo : null;
  $('#nameInput').value = en && en.name ? en.name : '';
  $('#grapeInput').value = en && en.grape ? en.grape : '';
  $('#vintageInput').value = en && en.vintage ? en.vintage : '';
  $('#noteInput').value = en ? en.note : '';
  $('#dateInput').value = (en ? en.date : todayLocal());
  setPhotoPreview(pickedPhoto);
  $('#delBtn').style.display = en ? 'block' : 'none';
  $('#sheetBg').classList.add('open');
}
function closeEditor() { $('#sheetBg').classList.remove('open'); }
function setPhotoPreview(src) {
  const img = $('#photoPreview');
  if (src) {
    img.src = src; img.style.display = 'block';
    $('#photoIco').style.display='none'; $('#photoLbl').style.display='none';
    $('#photoActions').style.display = 'none';
    $('#changePhotoBtn').style.display = 'block';
  } else {
    img.style.display = 'none';
    $('#photoIco').style.display='block'; $('#photoLbl').style.display='block';
    $('#photoActions').style.display = 'flex';
    $('#changePhotoBtn').style.display = 'none';
  }
}
$('#changePhotoBtn').onclick = () => {
  $('#photoActions').style.display = 'flex';
  $('#changePhotoBtn').style.display = 'none';
};

$('#settingsBtn').onclick = () => {
  const p = $('#settingsPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
};
$('#searchInput').oninput = e => { searchQuery = e.target.value; render(); };

$('#addBtn').onclick = () => openEditor(null);
$('#cancelBtn').onclick = closeEditor;
$('#sheetBg').onclick = e => { if (e.target === $('#sheetBg')) closeEditor(); };

$('#cameraBtn').onclick = () => $('#cameraInput').click();
$('#libraryBtn').onclick = () => $('#photoInput').click();

function onPhotoChosen(e) {
  const file = e.target.files[0]; if (!file) return;
  shrinkImage(file, dataUrl => { pickedPhoto = dataUrl; setPhotoPreview(dataUrl); });
  e.target.value = '';
}
$('#cameraInput').onchange = onPhotoChosen;
$('#photoInput').onchange = onPhotoChosen;

// 写真は端末に保存するので、大きすぎないよう縮小
function shrinkImage(file, cb) {
  const img = new Image();
  img.onload = () => {
    const max = 1000;
    let { width:w, height:h } = img;
    if (w > h && w > max) { h = h*max/w; w = max; }
    else if (h > max) { w = w*max/h; h = max; }
    const cv = document.createElement('canvas');
    cv.width = w; cv.height = h;
    cv.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(cv.toDataURL('image/jpeg', 0.82));
  };
  img.src = URL.createObjectURL(file);
}

$('#saveBtn').onclick = async () => {
  const name = $('#nameInput').value.trim();
  const grape = $('#grapeInput').value.trim();
  const vintage = $('#vintageInput').value.trim();
  const note = $('#noteInput').value.trim();
  const date = $('#dateInput').value || todayLocal();
  if (!name && !grape && !vintage && !note && !pickedPhoto) { closeEditor(); return; }
  await putEntry({ id: editingId || Date.now(), date, name, grape, vintage, note, photo: pickedPhoto });
  closeEditor(); render();
};
$('#delBtn').onclick = async () => {
  if (editingId && confirm('この記憶を消しますか？')) { await delEntry(editingId); closeEditor(); render(); }
};

// ---- バックアップ（端末だけだと消える心配があるので書き出せる）----
$('#exportBtn').onclick = async () => {
  const data = await allEntries();
  const blob = new Blob([JSON.stringify(data)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `wine-memory-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
};
$('#importBtn').onclick = () => $('#importInput').click();
$('#importInput').onchange = e => {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = async () => {
    try {
      const arr = JSON.parse(r.result);
      for (const en of arr) await putEntry(en);
      render(); alert('読み込みました');
    } catch { alert('うまく読み込めませんでした'); }
  };
  r.readAsText(file);
};

// iPhoneに「この記録は勝手に消さないで」とお願いする（消えにくくする）
if (navigator.storage && navigator.storage.persist) { navigator.storage.persist(); }

openDB().then(render);
</script>
</body>
</html>
